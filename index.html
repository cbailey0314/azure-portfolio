<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Carla's Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@1.8.0/dist/umd/lucide.min.js"></script>
<style>
:root{--navy:#0f172a;--azure:#0078D4;--azure-hover:#0063b1;--planned:#94a3b8;--progress:#f59e0b;--complete:#22c55e;--violet:#7C3AED}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:radial-gradient(ellipse at center,#0d1b2a 0%,#050a0f 100%);color:#e2e8f0;min-height:100vh}
#global-starfield{position:fixed;inset:0;z-index:0;pointer-events:none}
.star-layer{position:absolute;inset:0}
.card{background:rgba(13,27,42,0.85);backdrop-filter:blur(8px);border:1px solid rgba(0,120,212,0.2);border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.3);transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,120,212,0.15)}
.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:9999px;font-size:12px;font-weight:500}
.badge-planned{background:rgba(148,163,184,0.15);color:#94a3b8}
.badge-progress{background:rgba(245,158,11,0.15);color:#fbbf24}
.badge-complete{background:rgba(34,197,94,0.15);color:#4ade80}
.tag-pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:500;background:rgba(0,120,212,0.2);color:#66b0ff}
.progress-bar{height:8px;border-radius:9999px;background:rgba(255,255,255,0.1);overflow:hidden}
.progress-fill{height:100%;border-radius:9999px;transition:width 1s ease}
.nav-header{position:fixed;top:0;left:0;right:0;z-index:100;background:#0f172a;height:56px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid rgba(255,255,255,0.06)}
.main-content{padding-top:64px;position:relative;z-index:1}
.btn-primary{background:#0078D4;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s}
.btn-primary:hover{background:#0063b1}
.download-app-btn{border:1px solid rgba(255,255,255,0.4);color:#fff;background:transparent;padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.download-app-btn:hover{background:rgba(255,255,255,0.1)}
.portfolio-view-btn{border:1px solid rgba(255,255,255,0.4);color:#fff;background:transparent;padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.portfolio-view-btn:hover{background:rgba(255,255,255,0.1)}
.tab-btn{padding:6px 16px;border-radius:9999px;font-size:13px;font-weight:500;color:#cbd5e1;cursor:pointer;white-space:nowrap;border:none;background:transparent;transition:background .15s,color .15s}
.tab-btn.active{background:#0078D4;color:#fff}
.tab-btn:hover:not(.active){background:rgba(255,255,255,0.1);color:#fff}
.dash-glass-card{background:rgba(13,27,42,0.85)!important;backdrop-filter:blur(8px);border:1px solid rgba(0,120,212,0.25)!important;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.3);transition:transform .2s,box-shadow .2s}
.dash-glass-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,120,212,0.15)}
.dash-progress-bar{height:8px;border-radius:9999px;background:rgba(255,255,255,0.1);overflow:hidden}
.dash-tag-pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:500;background:rgba(0,120,212,0.2);color:#66b0ff}
.dash-domain-card{background:rgba(13,27,42,0.85)!important;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08)!important;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.3);transition:transform .2s,box-shadow .2s}
.dash-domain-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.35)}
.dash-domain-card.clickable-card{cursor:pointer}
.credit-summary-card{background:linear-gradient(135deg,rgba(0,120,212,0.12),rgba(124,58,237,0.08));border:1px solid rgba(0,120,212,0.3);border-radius:14px;padding:20px 24px}
.credit-bar-segment{height:100%;display:inline-block;transition:width 1s ease}
.next-chapter-card{background:rgba(13,27,42,0.85);backdrop-filter:blur(8px);border:1px solid rgba(0,120,212,0.2);border-radius:12px;border-left:4px solid #7C3AED;position:relative;z-index:9999;isolation:isolate;overflow:visible;transition:box-shadow .3s}
.next-chapter-card:hover{box-shadow:0 6px 24px rgba(124,58,237,0.2)}
footer{position:relative;z-index:1}
.no-print{display:block}
@media print{.no-print{display:none!important}}
</style>
</head>
<body>
<!-- GLOBAL STARFIELD -->
<div id="global-starfield"></div>

<!-- NAV HEADER -->
<header class="nav-header no-print" id="main-header">
  <div class="flex items-center gap-2 flex-shrink-0">
    <span class="text-white font-bold text-base">⭐ Carla's Portfolio</span>
  </div>
  <div class="flex-1 flex justify-center mx-4">
    <div class="hidden md:flex items-center gap-1" id="desktop-tabs"></div>
  </div>
  <div class="flex items-center gap-2 flex-shrink-0">
    <button class="download-app-btn hidden md:inline-flex items-center gap-1" id="download-app-btn"><i data-lucide="download" class="w-4 h-4"></i> Download App</button>
    <button class="portfolio-view-btn hidden md:inline-flex items-center gap-1" id="portfolio-btn"><i data-lucide="clipboard-list" class="w-4 h-4"></i> Portfolio View</button>
    <button class="md:hidden p-2 text-white" id="mobile-menu-btn"><i data-lucide="menu" class="w-6 h-6"></i></button>
  </div>
</header>

<!-- MOBILE MENU -->
<nav id="mobile-menu" class="hidden fixed inset-0 bg-navy-900 z-50 flex flex-col p-4 no-print" style="background:#0f172a">
  <div class="flex justify-between items-center mb-6">
    <span class="text-white font-bold">⭐ Carla's Portfolio</span>
    <button id="mobile-menu-close" class="p-2 text-white"><i data-lucide="x" class="w-6 h-6"></i></button>
  </div>
  <div class="flex flex-col gap-2" id="mobile-tabs"></div>
  <button class="download-app-btn mt-4 w-full text-center" id="download-app-btn-mobile"><i data-lucide="download" class="w-4 h-4 inline"></i> Download App</button>
  <button class="portfolio-view-btn mt-2 w-full text-center" id="portfolio-btn-mobile"><i data-lucide="clipboard-list" class="w-4 h-4 inline"></i> Portfolio View</button>
</nav>

<main class="main-content pb-8" id="app-main">
</main>

<footer class="py-6 text-center no-print">
  <p class="text-xs text-surface-500">© 2026 Nightfield LLC. All rights reserved.</p>
</footer>

<script>
// ============ GLOBAL STARFIELD ============
function initGlobalStarfield(){
  const container=document.getElementById('global-starfield');
  let stars='';
  for(let i=0;i<150;i++){
    const x=Math.random()*100,y=Math.random()*100,s=Math.random()>0.93?3:Math.random()>0.8?2:1;
    stars+=`${x}vw ${y}vh 0 ${s-1}px rgba(255,255,255,0.8),`;
  }
  stars=stars.slice(0,-1);
  container.innerHTML=`<div class="star-layer" style="box-shadow:${stars}"></div>`;
}
initGlobalStarfield();

// ============ PASSWORD PROTECTION FOR DOWNLOAD BUTTON ============
function passwordProtectedDownload(){
  const PASSWORD = 'carla42';
  const userInput = prompt('Private Feature:');
  
  if (userInput === null) {
    return;
  }
  
  if (userInput !== PASSWORD) {
    alert('Thou Shall Not Pass!!!');
    return;
  }
  
  downloadApp();
}

function downloadApp(){
  var html='<!DOCTYPE html>\n'+document.documentElement.outerHTML;
  var blob=new Blob([html],{type:'text/html'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='cloud-portfolio.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ============ DOWNLOAD BUTTON CLICK HANDLER ============
document.addEventListener('DOMContentLoaded', function(){
  const downloadBtnDesktop = document.getElementById('download-app-btn');
  const downloadBtnMobile = document.getElementById('download-app-btn-mobile');
  
  if(downloadBtnDesktop){
    downloadBtnDesktop.addEventListener('click', passwordProtectedDownload);
  }
  
  if(downloadBtnMobile){
    downloadBtnMobile.addEventListener('click', passwordProtectedDownload);
  }

  // Mobile menu
  const mobileMenuBtn = document.getElementById('mobile-menu-btn');
  const mobileMenu = document.getElementById('mobile-menu');
  const mobileMenuClose = document.getElementById('mobile-menu-close');
  
  if(mobileMenuBtn) {
    mobileMenuBtn.addEventListener('click', function() {
      mobileMenu.classList.remove('hidden');
    });
  }
  
  if(mobileMenuClose) {
    mobileMenuClose.addEventListener('click', function() {
      mobileMenu.classList.add('hidden');
    });
  }

  // Initialize app
  initData();
  buildNav();
  render();
  lucide.createIcons();
});

// ============ DATA & CONSTANTS ============
const DATA_VERSION='v13';
const TABS=['Dashboard','Cloud Projects','Linux','Azure Labs','AI Work','Cybersecurity','CSU','👤 Profile'];
const TOTAL_CREDIT_GOAL=120;

let currentTab=0;
let portfolioMode=false;

// ============ HELPERS ============
function genId(){return Math.random().toString(36).substr(2,9)}
function save(k,v){localStorage.setItem(k,JSON.stringify(v))}
function load(k){try{return JSON.parse(localStorage.getItem(k))}catch(e){return null}}
function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function getDefaultEntries(){
  return {
    cloudProjects:[
      {id:genId(),title:"Multi-Tier Web App on Azure",description:"Deploy a 3-tier web application using Azure App Service.",status:"Planned",tags:["Azure","App Service"]},
      {id:genId(),title:"Serverless Event Pipeline",description:"Event-driven pipeline using Azure Functions.",status:"In Progress",tags:["Azure Functions","Events"]},
    ],
    linux:[
      {id:genId(),title:"Linux File System & Permissions Lab",description:"Exercises covering file permissions.",status:"Complete",tags:["Linux","Bash"]},
    ],
    azureLabs:[
      {id:genId(),title:"AZ-900 Fundamentals Labs",description:"Completed Microsoft Learn hands-on labs.",status:"Complete",tags:["Azure","AZ-900"]},
    ],
    aiWork:[
      {id:genId(),title:"QuickBooks AI Integration Analysis",description:"Analyzed AI features.",status:"Complete",tags:["AI"]},
    ],
    cybersecurity:[
      {id:genId(),title:"Network Security Fundamentals",description:"Coursework covering security.",status:"In Progress",tags:["Networking"]},
    ],
    csu:[]
  };
}

function getDefaultProfile(){
  return {
    name:"Carla Bailey",
    title:"Azure Solutions Architect Candidate",
    location:"Cortez, CO",
    email:"carla.bailey0314@outlook.com"
  };
}

function initData(){
  if(localStorage.getItem('portfolioDataVersion')!==DATA_VERSION){
    ['portfolioEntries','portfolioProfile','portfolioDataVersion'].forEach(k=>localStorage.removeItem(k));
    save('portfolioEntries',getDefaultEntries());
    save('portfolioProfile',getDefaultProfile());
    localStorage.setItem('portfolioDataVersion',DATA_VERSION);
  }
}

function getEntries(){return load('portfolioEntries')||getDefaultEntries();}
function getProfile(){return load('portfolioProfile')||getDefaultProfile();}

// ============ CREDIT CALCULATOR ============
function calcCredits(){
  return {totalEarned:25.34,totalInProg:3,totalPlanned:91.66,total:120};
}

// ============ NAV ============
function buildNav(){
  const dt=document.getElementById('desktop-tabs');
  const mt=document.getElementById('mobile-tabs');
  dt.innerHTML='';
  mt.innerHTML='';
  
  TABS.forEach((t,i)=>{
    const b=document.createElement('button');
    b.className='tab-btn'+(i===currentTab?' active':'');
    b.textContent=t;
    b.dataset.tab=i;
    b.addEventListener('click',()=>{currentTab=i;portfolioMode=false;render();lucide.createIcons();});
    dt.appendChild(b);
    
    const mb=document.createElement('button');
    mb.className='tab-btn w-full text-left py-3'+(i===currentTab?' active':'');
    mb.textContent=t;
    mb.dataset.tab=i;
    mb.addEventListener('click',()=>{currentTab=i;portfolioMode=false;document.getElementById('mobile-menu').classList.add('hidden');render();lucide.createIcons();});
    mt.appendChild(mb);
  });
}

// ============ RENDER DASHBOARD ============
function renderDashboard(){
  const entries=getEntries();
  const cr=calcCredits();
  const earnedPct=Math.round(cr.totalEarned/TOTAL_CREDIT_GOAL*100);
  const inProgPct=Math.round(cr.totalInProg/TOTAL_CREDIT_GOAL*100);
  const plannedPct=Math.round(cr.totalPlanned/TOTAL_CREDIT_GOAL*100);
  
  let html=`<div class="relative" style="position:relative;z-index:1;overflow:visible;">`;
  html+=`<div class="relative z-10 max-w-7xl mx-auto px-4 md:px-6 py-6" style="overflow:visible;">`;
  html+=`<h2 class="text-xl md:text-2xl font-bold text-white mb-6 flex items-center gap-2"><i data-lucide="layout-dashboard" class="w-6 h-6 inline"></i>Dashboard</h2>`;
  
  html+=`<div class="credit-summary-card mb-6">`;
  html+=`<div class="flex flex-col md:flex-row md:items-center gap-4 mb-4">`;
  html+=`<div class="flex-1">`;
  html+=`<div class="flex items-center justify-between mb-1">`;
  html+=`<span class="text-sm font-bold text-white flex items-center gap-2"><i data-lucide="graduation-cap" class="w-4 h-4"></i>Progress</span>`;
  html+=`</div>`;
  html+=`<div class="flex items-center gap-3 mb-2">`;
  html+=`<span class="text-2xl font-bold text-white">${cr.totalEarned.toFixed(1)}</span>`;
  html+=`<span class="text-sm text-slate-400">/ ${TOTAL_CREDIT_GOAL} credits earned</span>`;
  html+=`</div>`;
  html+=`<div class="h-4 rounded-full overflow-hidden flex" style="background:rgba(255,255,255,0.1)">`;
  html+=`<div class="credit-bar-segment" style="width:${Math.min(earnedPct,100)}%;background:#22c55e"></div>`;
  html+=`<div class="credit-bar-segment" style="width:${Math.min(inProgPct,100-earnedPct)}%;background:#f59e0b"></div>`;
  html+=`<div class="credit-bar-segment" style="width:${Math.min(plannedPct,100-earnedPct-inProgPct)}%;background:#475569"></div>`;
  html+=`</div>`;
  html+=`</div>`;
  html+=`</div>`;
  html+=`</div>`;
  
  html+=`<div class="dash-glass-card p-6 mb-6">`;
  html+=`<h3 class="text-lg font-bold text-white mb-4">Recent Work</h3>`;
  
  const allEntries=Object.values(entries).filter(v=>Array.isArray(v)).flat().slice(0,5);
  allEntries.forEach(entry=>{
    const statusColor=entry.status==='Complete'?'#22c55e':entry.status==='In Progress'?'#0078D4':'#f59e0b';
    html+=`<div class="mb-4 pb-4 border-b border-slate-700 last:border-b-0">`;
    html+=`<div class="flex items-start justify-between">`;
    html+=`<div>`;
    html+=`<h4 class="text-white font-semibold">${esc(entry.title)}</h4>`;
    html+=`<p class="text-sm text-slate-400 mt-1">${esc(entry.description)}</p>`;
    html+=`</div>`;
    html+=`<span class="badge" style="background:rgba(0,120,212,0.15);color:#66b0ff">${entry.status}</span>`;
    html+=`</div>`;
    html+=`</div>`;
  });
  
  html+=`</div>`;
  html+=`</div>`;
  html+=`</div>`;
  
  return html;
}

// ============ RENDER ============
function render(){
  const main=document.getElementById('app-main');
  
  if(currentTab===0){
    main.innerHTML=renderDashboard();
  } else {
    main.innerHTML=`<div class="max-w-7xl mx-auto px-4 py-6"><div class="dash-glass-card p-6"><h2 class="text-white text-2xl font-bold">Tab ${currentTab}</h2><p class="text-slate-400 mt-2">Content coming soon...</p></div></div>`;
  }
}
</script>
</body>
</html>
