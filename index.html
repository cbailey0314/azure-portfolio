<script>
// Initialize Lucide icons
lucide.createIcons();

// ============ GLOBAL STARFIELD ============
function initGlobalStarfield(){
  const container=document.getElementById('global-starfield');
  let stars='';
  for(let i=0;i<150;i++){
    const x=Math.random()*100,y=Math.random()*100,s=Math.random()>0.93?3:Math.random()>0.8?2:1,o=(Math.random()*0.6+0.3).toFixed(2);
    stars+=`${x}vw ${y}vh 0 ${s-1}px rgba(255,255,255,${o}),`;
  }
  stars=stars.slice(0,-1);
  let bigStars='';
  for(let i=0;i<8;i++){
    const x=Math.random()*90+5,y=Math.random()*80+10;
    bigStars+=`${x}vw ${y}vh 0 2px rgba(255,255,255,0.8),`;
  }
  bigStars=bigStars.slice(0,-1);
  container.innerHTML=`<div class="star-layer" style="box-shadow:${stars}"></div><div class="star-layer" style="box-shadow:${bigStars};animation:twinkle 4s ease-in-out infinite"></div>`;
}
initGlobalStarfield();

// ============ DOWNLOAD APP FUNCTION ============
function downloadApp(){
  var html='<!DOCTYPE html>\n'+document.documentElement.outerHTML;
  var blob=new Blob([html],{type:'text/html'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='cloud-portfolio.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ============ PASSWORD PROTECTION FOR DOWNLOAD BUTTON ============
function initPasswordProtection(){
  const PASSWORD='carla';
  const downloadBtnDesktop=document.getElementById('download-app-btn');
  const downloadBtnMobile=document.getElementById('download-app-btn-mobile');
  
  function requestPassword(){
    const userInput=prompt('Enter password to access the Download App feature:');
    return userInput===PASSWORD;
  }
  
  function setupDownloadButton(btn){
    if(!btn)return;
    btn.addEventListener('click',function(e){
      e.preventDefault();
      if(!requestPassword()){
        alert('Incorrect password. This feature is private.');
        return;
      }
      downloadApp();
    });
  }
  
  setupDownloadButton(downloadBtnDesktop);
  setupDownloadButton(downloadBtnMobile);
}

  return data;
}

function renderDashboard(){
  const entries=getEntries();
  let html='<div class="max-w-7xl mx-auto px-4 md:px-6 py-6">';
  html+='<h2 class="text-2xl font-bold text-white mb-6">📊 Dashboard</h2>';
  html+='<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">';
  
  DOMAIN_NAMES.forEach((name,i)=>{
    const slug=DOMAIN_SLUGS[i];
    const items=entries[slug]||[];
    const complete=items.filter(e=>e.status==='Complete').length;
    const inProg=items.filter(e=>e.status==='In Progress').length;
    const planned=items.filter(e=>e.status==='Planned').length;
    const accent=DOMAIN_ACCENT_COLORS[i];
    
    html+=`<div class="dash-domain-card p-5" style="border-left:4px solid ${accent}!important">`;
    html+=`<h3 class="text-lg font-bold text-white mb-3">${name}</h3>`;
    html+=`<div class="dash-progress-bar mb-3"><div class="progress-fill" style="width:${complete/(items.length||1)*100}%;background:${accent}"></div></div>`;
    html+=`<div class="flex gap-4 text-xs"><span class="text-slate-300">✓ ${complete} Complete</span><span class="text-slate-300">⏳ ${inProg} In Progress</span><span class="text-slate-300">📋 ${planned} Planned</span></div>`;
    html+='</div>';
  });
  
  html+='</div></div>';
  return html;
}

function render(){
  const main=document.getElementById('app-main');
  let content='';
  
  switch(currentTab){
    case 0: content=renderDashboard(); break;
    case 1: content=renderCloudProjects(); break;
    case 2: content=renderLinux(); break;
    case 3: content=renderAzureLabs(); break;
    case 4: content=renderAiWork(); break;
    case 5: content=renderCybersecurity(); break;
    case 6: content=renderProfile(); break;
    default: content=renderDashboard();
  }
  
  main.innerHTML=content;
  lucide.createIcons();
  buildNav();
}

function buildNav(){
  const dt=document.getElementById('desktop-tabs');
  const mt=document.getElementById('mobile-tabs');
  dt.innerHTML='';
  mt.innerHTML='';
  
  TABS.forEach((t,i)=>{
    const b=document.createElement('button');
    b.className='tab-btn'+(i===currentTab?' active':'');
    b.textContent=t;
    b.onclick=()=>{currentTab=i;portfolioMode=false;render();};
    dt.appendChild(b);
    
    const mb=document.createElement('button');
    mb.className='tab-btn w-full text-left py-3'+(i===currentTab?' active':'');
    mb.textContent=t;
    mb.onclick=()=>{currentTab=i;portfolioMode=false;document.getElementById('mobile-menu').classList.add('hidden');render();};
    mt.appendChild(mb);
  });
}

// ============ INITIALIZATION ============
document.addEventListener('DOMContentLoaded',function(){
  initData();
  initPasswordProtection();
  
  const mobileMenuBtn=document.getElementById('mobile-menu-btn');
  const mobileMenuClose=document.getElementById('mobile-menu-close');
  const mobileMenu=document.getElementById('mobile-menu');
  
  if(mobileMenuBtn)mobileMenuBtn.addEventListener('click',()=>mobileMenu.classList.remove('hidden'));
  if(mobileMenuClose)mobileMenuClose.addEventListener('click',()=>mobileMenu.classList.add('hidden'));
  
  render();
});
