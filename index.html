<script>
// ============ GLOBAL STARFIELD ============
function initGlobalStarfield(){
  const container=document.getElementById('global-starfield');
  let stars='';for(let i=0;i<150;i++){const x=Math.random()*100,y=Math.random()*100,s=Math.random()>0.93?3:Math.random()>0.8?2:1,o=(Math.random()*0.6+0.3).toFixed(2);stars+=`${x}vw ${y}vh 0 ${s-1}px rgba(255,255,255,${o}),`;}
  stars=stars.slice(0,-1);
  let bigStars='';for(let i=0;i<8;i++){const x=Math.random()*90+5,y=Math.random()*80+10;bigStars+=`${x}vw ${y}vh 0 2px rgba(255,255,255,0.8),`;}bigStars=bigStars.slice(0,-1);
  container.innerHTML=`<div class="star-layer" style="box-shadow:${stars}"></div><div class="star-layer" style="box-shadow:${bigStars};animation:twinkle 4s ease-in-out infinite"></div>`;
}
initGlobalStarfield();

// ============ DOWNLOAD APP FUNCTION ============
function downloadApp(){
  var html='<!DOCTYPE html>\n'+document.documentElement.outerHTML;
  var blob=new Blob([html],{type:'text/html'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='cloud-portfolio.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ============ PDF TOAST HELPER ============
function showPdfToast(msg){
  var existing=document.getElementById('pdf-popup-toast');
  if(existing)existing.remove();
  var toast=document.createElement('div');
  toast.id='pdf-popup-toast';
  toast.className='pdf-toast';
  toast.textContent=msg;
  document.body.appendChild(toast);
  requestAnimationFrame(function(){requestAnimationFrame(function(){toast.classList.add('visible');});});
  setTimeout(function(){toast.classList.remove('visible');setTimeout(function(){if(toast.parentNode)toast.remove();},350);},4000);
}

// ============ OPEN PDF DATA ============
function openPdfData(dataUri){
  try{
    var byteString=atob(dataUri.split(',')[1]);
    var ab=new ArrayBuffer(byteString.length);
    var ia=new Uint8Array(ab);
    for(var i=0;i<byteString.length;i++)ia[i]=byteString.charCodeAt(i);
    var blob=new Blob([ab],{type:'application/pdf'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;
    a.target='_blank';
    a.rel='noopener';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},3000);
    showPdfToast("If the PDF didn\u2019t open, check your browser\u2019s popup blocker and allow popups for this site.");
  }catch(e){
    var existing=document.getElementById('pdf-modal-overlay');
    if(existing)existing.remove();
    var overlay=document.createElement('div');
    overlay.id='pdf-modal-overlay';
    overlay.className='pdf-modal-overlay-style';
    var container=document.createElement('div');
    container.className='pdf-modal-container';
    var header=document.createElement('div');
    header.className='pdf-modal-header';
    var title=document.createElement('span');
    title.textContent='\uD83D\uDCC4 Certificate Viewer';
    var closeBtn=document.createElement('button');
    closeBtn.className='pdf-modal-close-btn';
    closeBtn.textContent='\u2715 Close';
    closeBtn.addEventListener('click',function(){
      var el=document.getElementById('pdf-modal-overlay');
      if(el)el.remove();
    });
    header.appendChild(title);
    header.appendChild(closeBtn);
    var embedObj=document.createElement('object');
    embedObj.setAttribute('data',dataUri);
    embedObj.setAttribute('type','application/pdf');
    embedObj.style.cssText='flex:1;border:none;width:100%;height:100%;';
    var fallbackMsg=document.createElement('p');
    fallbackMsg.style.cssText='color:#94a3b8;text-align:center;padding:40px;';
    fallbackMsg.textContent='Your browser cannot display this PDF inline. Try downloading it instead.';
    embedObj.appendChild(fallbackMsg);
    container.appendChild(header);
    container.appendChild(embedObj);
    overlay.appendChild(container);
    document.body.appendChild(overlay);
    overlay.addEventListener('click',function(ev){
      if(ev.target===overlay){overlay.remove();}
    });
  }
}

// ============ HELPERS ============
function genId(){return Math.random().toString(36).substr(2,9)}
function save(k,v){localStorage.setItem(k,JSON.stringify(v))}
function load(k){try{return JSON.parse(localStorage.getItem(k))}catch(e){return null}}
function fmtDate(d){if(!d)return '';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-US',{month:'short',year:'numeric'})}
function fmtDateFull(d){if(!d)return '';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}
function monthDiff(a,b){if(!a||!b)return 0;const da=new Date(a+'T00:00:00'),db=new Date(b+'T00:00:00');return Math.max(1,Math.round((db-da)/(1000*60*60*24*30)))}
function statusBadge(s){const c=s==='Complete'?'badge-complete':s==='In Progress'?'badge-progress':'badge-planned';return `<span class="${c} badge">${s}</span>`}
function tagPills(tags){return (tags||[]).map(t=>`<span class="tag-pill">${esc(t)}</span>`).join('')}
function dashTagPills(tags){return (tags||[]).map(t=>`<span class="dash-tag-pill">${esc(t)}</span>`).join('')}
function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function today(){return '2026-05-10'}
function fmtFileSize(bytes){if(!bytes||bytes<=0)return '';if(bytes<1024)return bytes+' B';if(bytes<1048576)return (bytes/1024).toFixed(1)+' KB';return (bytes/1048576).toFixed(1)+' MB';}
function resolveFileType(entry){
  if(entry.fileType)return entry.fileType;
  if(!entry.photoData)return '';
  if(entry.fileName&&entry.fileName.toLowerCase().endsWith('.pdf'))return 'pdf';
  if(entry.photoData&&entry.photoData.startsWith('data:application/pdf'))return 'pdf';
  return 'image';
}

['portfolioEntries','badgesCredentials','portfolioProfile','degreeGoals','portfolioDataVersion'].forEach(k=>localStorage.removeItem(k));

entries.csu=csu;
save('portfolioEntries',entries);

localStorage.setItem('portfolioDataVersion',DATA_VERSION);
}
}

// ============ NAV ============
function buildNav(){
const dt=document.getElementById('desktop-tabs');
const mt=document.getElementById('mobile-tabs');
dt.innerHTML='';mt.innerHTML='';
TABS.forEach((t,i)=>{
const b=document.createElement('button');
b.className='tab-btn'+(i===currentTab?' active':'');
b.textContent=t;
b.dataset.tab=i;
dt.appendChild(b);
const mb=document.createElement('button');
mb.className='tab-btn w-full text-left py-3'+(i===currentTab?' active':'');
mb.textContent=t;
mb.dataset.tab=i;
mt.appendChild(mb);

function generateStarfield(){

stars=stars.slice(0,-1);
let bigStars='';for(let i=0;i<6;i++){const x=Math.random()*90+5,y=Math.random()*80+10;bigStars+=`${x}vw ${y}vh 0 2px rgba(255,255,255,0.8),`;}bigStars=bigStars.slice(0,-1);
return {stars,bigStars};
}

function renderConstellation(){
const entries=getEntries();
const csu=entries.csu||[];
const goals=getGoals();

let html=`<div class="relative">`;
html+=`<div class="relative z-10"><div class="mb-6"><h3 class="text-white font-bold text-lg">🛸 Degree Constellation</h3><p class="text-slate-400 text-sm">Track your credits across each program</p></div>`;
html+=`<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">`;
let totalLogged=0;
DEGREE_TRACKS.forEach((track,i)=>{
const goal=goals[track]||0;
let earned=0,inProg=0,planned=0;
csu.forEach(c=>{if((c.degreeTrack||[]).includes(track)){if(c.status==='Complete')earned+=c.credits||0;else if(c.status==='In Progress')inProg+=c.credits||0;else planned+=c.credits||0;}});
totalLogged+=earned+inProg+planned;
const pct=goal?Math.min(100,Math.round(earned/goal*100)):0;
const r=28,circ=2*Math.PI*r,offset=circ-(pct/100)*circ;
html+=`<div class="constellation-card"><div class="flex items-center gap-2 mb-3"><span class="text-xl">${DEGREE_TRACK_ICONS[i]}</span><div class="flex-1 min-w-0"><div class="text-white font-semibold text-sm truncate">${track}</div><div class="text-azure-300 text-xs font-medium">${earned.toFixed(1)} / ${goal} cr</div></div></div>`;
html+=`<div class="flex justify-center mb-3"><svg width="70" height="70" class="credit-ring"><circle cx="35" cy="35" r="${r}" stroke="#1e293b" stroke-width="5" fill="none"/><circle cx="35" cy="35" r="${r}" stroke="#0078D4" stroke-width="5" fill="none" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" transform="rotate(-90 35 35)"/><text x="35" y="38" text-anchor="middle" fill="white" font-size="13" font-weight="bold">${pct}%</text></svg></div>`;
const eW=goal?(earned/goal*100):0,iW=goal?(inProg/goal*100):0,pW=goal?(planned/goal*100):0;
html+=`<div class="h-2 rounded-full overflow-hidden flex mb-2" style="background:#1e293b"><div style="width:${Math.min(eW,100)}%;background:#22c55e" class="h-full"></div><div style="width:${Math.min(iW,100-eW)}%;background:#f59e0b" class="h-full"></div><div style="width:${Math.min(pW,100-eW-iW)}%;background:#475569" class="h-full"></div></div>`;
html+=`<div class="text-xs text-slate-400">${earned.toFixed(1)} earned · ${inProg.toFixed(1)} in progress · ${planned.toFixed(1)} planned</div>`;
html+=`<div class="mt-2 flex items-center gap-1 text-xs"><span class="text-slate-400">🎯 Goal:</span><span class="text-white font-medium goal-val" data-track="${track}">${goal} cr</span><button class="text-azure-400 hover:text-azure-300 ml-1 edit-goal-btn" data-track="${track}" title="Edit goal"><i data-lucide="pencil" class="w-3 h-3"></i></button></div>`;
html+=`</div>`;
});
html+=`</div>`;
html+=`<p class="text-center text-slate-500 text-sm mt-6">Total Credits Logged: ${totalLogged.toFixed(1)} cr across all programs</p>`;
html+=`</div></div>`;
return html;
}

function renderBadgeList(filter='All',sort='newest',search=''){
const container=document.getElementById('badge-list');
if(!container)return;
let badges=[...getBadges()];
if(filter!=='All')badges=badges.filter(b=>b.category===filter);
if(search)badges=badges.filter(b=>(b.title+' '+b.issuer).toLowerCase().includes(search.toLowerCase()));
if(sort==='newest')badges.sort((a,b)=>(b.dateEarned||'').localeCompare(a.dateEarned||''));
else if(sort==='oldest')badges.sort((a,b)=>(a.dateEarned||'').localeCompare(b.dateEarned||''));
else if(sort==='az')badges.sort((a,b)=>a.title.localeCompare(b.title));
if(!badges.length){
container.innerHTML=`<div class="card p-12 text-center"><p class="text-slate-400">No credentials yet — add your first badge or certificate! 🏅</p></div>`;
return;
}
let html=`<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">`;
badges.forEach(b=>{
const color=BADGE_CAT_COLOR[b.category]||'#9ca3af';
const emoji=BADGE_CAT_EMOJI[b.category]||'📋';
const expired=b.expirationDate&&b.expirationDate<today();
const ft=resolveFileType(b);
html+=`<div class="card overflow-hidden relative" style="border-left:4px solid ${color}">`;
if(expired)html+=`<div class="absolute top-2 right-2 z-10"><span class="badge" style="background:rgba(124,58,237,0.2);color:#c4b5fd">⚠️ Expired</span></div>`;
if(b.photoData && ft==='image'){
html+=`<div style="height:140px;overflow:hidden"><img src="${b.photoData}" class="w-full h-full object-cover" alt="${esc(b.title)}"></div>`;
}else if(b.photoData && ft==='pdf'){
html+=`<div class="pdf-thumb-placeholder"><span class="pdf-emoji">📄</span><span class="pdf-filename">${esc(b.fileName||'Certificate.pdf')}</span><button class="pdf-view-pill view-pdf-thumb-btn" data-id="${b.id}">👁 View PDF</button></div>`;
}else{
html+=`<div class="cert-placeholder" style="background:linear-gradient(135deg,${color}15,${color}30)"><span class="text-4xl">${emoji}</span></div>`;
}
html+=`<div class="p-4"><h3 class="font-semibold text-white text-sm mb-1">${esc(b.title)}</h3><p class="text-xs text-slate-400 mb-2">${esc(b.issuer)}</p>`;
html+=`<div class="flex flex-wrap gap-2 mb-2"><span class="badge" style="background:${color}15;color:${color}">${b.category}</span>`;
html+=`<span class="text-xs text-slate-400">${b.dateEarned?fmtDate(b.dateEarned):'<em>Date not set</em>'}</span></div>`;
if(b.credentialId)html+=`<p class="text-xs font-mono text-slate-500 mb-1">ID: ${esc(b.credentialId)}</p>`;
if(b.credentialUrl)html+=`<a href="${esc(b.credentialUrl)}" target="_blank" class="text-xs text-azure-400 hover:underline flex items-center gap-1 mb-2"><i data-lucide="external-link" class="w-3 h-3"></i> View Credential</a>`;
if(b.tags&&b.tags.length)html+=`<div class="flex flex-wrap gap-1 mb-2">${tagPills(b.tags)}</div>`;
html+=`<div class="flex items-center gap-2 mt-2 pt-2 border-t flex-wrap" style="border-color:rgba(255,255,255,0.08)"><button class="showcase-star ${b.showcase?'active':''}" data-id="${b.id}" data-domain="badges" title="Toggle showcase">★</button>`;
html+=`<button class="btn-secondary text-xs py-1 px-2 edit-badge-btn" data-id="${b.id}"><i data-lucide="pencil" class="w-3 h-3 inline"></i></button>`;
html+=`<button class="btn-danger text-xs py-1 px-2 del-badge-btn" data-id="${b.id}"><i data-lucide="trash-2" class="w-3 h-3 inline"></i></button>`;
html+=`<label class="btn-secondary text-xs py-1 px-2 cursor-pointer upload-badge-btn"><i data-lucide="paperclip" class="w-3 h-3 inline"></i> ${b.photoData?'🔄 Replace':'📎 Upload Certificate'}<input type="file" accept="image/*,.pdf" class="hidden badge-file-input" data-id="${b.id}"></label>`;
if(b.photoData)html+=`<button class="btn-secondary text-xs py-1 px-2 view-badge-btn" data-id="${b.id}"><i data-lucide="eye" class="w-3 h-3 inline"></i> View</button>`;
html+=`</div></div></div>`;
});
html+=`</div>`;
container.innerHTML=html;
lucide.createIcons();
bindBadgeEvents();
}

let photoData=e.photoData||'',fileName=e.fileName||'',fileType=existingFt||'',fileSize=0;

function renderFormPreview(){
  const previewArea=document.getElementById('bf-preview-area');

  if(fileType==='pdf'){

    document.getElementById('bf-preview-pdf').addEventListener('click',()=>openPdfData(photoData));
    document.getElementById('bf-remove-file').addEventListener('click',()=>{photoData='';fileName='';fileType='';fileSize=0;document.getElementById('bf-file-name').textContent='';renderFormPreview();});

}

html+=`<div class="flex flex-wrap gap-3 mt-2 justify-center sm:justify-start">`;

if(p.website)html+=`<a href="${esc(p.website)}" target="_blank" rel="noopener" class="text-xs text-azure-400 hover:underline flex items-center gap-1"><i data-lucide="globe" class="w-3 h-3"></i> Website</a>`;
html+=`</div></div></div>`;

html+=`<p class="text-xs text-slate-500 mt-4 text-right">Azure Solutions Architect Portfolio · ${td}</p></div>`;
const allDomains=[...DOMAIN_SLUGS,'csu'];
const allNames=[...DOMAIN_NAMES,'CSU'];
const allIcons=[...DOMAIN_ICONS,'graduation-cap'];
allDomains.forEach((slug,i)=>{

html+=`<div class="mb-8"><h2 class="text-lg font-bold text-white mb-4 flex items-center gap-2"><i data-lucide="${allIcons[i]}" class="w-5 h-5 text-azure-400"></i>${allNames[i]}</h2>`;

if(e.link)html+=`<a href="${esc(e.link)}" target="_blank" class="text-xs text-azure-400 mt-2 inline-block">View Project →</a>`;
html+=`</div>`;
});
html+=`</div></div>`;
});
const showcaseBadges=badges.filter(b=>b.showcase);
if(showcaseBadges.length){
html+=`<div class="mb-8"><h2 class="text-lg font-bold text-white mb-4 flex items-center gap-2"><i data-lucide="award" class="w-5 h-5 text-azure-400"></i>Badges & Credentials</h2>`;
html+=`<div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;
showcaseBadges.forEach(b=>{
const color=BADGE_CAT_COLOR[b.category]||'#9ca3af';
const emoji=BADGE_CAT_EMOJI[b.category]||'📋';
const ft=resolveFileType(b);
html+=`<div class="card p-4" style="border-left:4px solid ${color}"><div class="flex items-start gap-3">`;
if(b.photoData && ft==='image')html+=`<img src="${b.photoData}" class="w-12 h-12 rounded object-cover" alt="">`;
else if(b.photoData && ft==='pdf')html+=`<div class="w-12 h-12 rounded flex items-center justify-center text-xl" style="background:linear-gradient(135deg,#1e293b,#0f172a)">📄</div>`;
else html+=`<div class="w-12 h-12 rounded flex items-center justify-center text-xl" style="background:${color}22">${emoji}</div>`;

if(b.credentialUrl)html+=`<a href="${esc(b.credentialUrl)}" target="_blank" class="text-xs text-azure-400 mt-1 inline-block">View Credential →</a>`;
html+=`</div></div></div>`;
});
html+=`</div></div>`;
}
html+=`</div>`;
return html;
}

// ============ MAIN RENDER ============
function render(){
buildNav();
const main=document.getElementById('app-main');
// Always use space background — no toggling
main.style.background='transparent';
main.style.minHeight='calc(100vh - 64px)';
if(portfolioMode){
main.innerHTML=renderPortfolioView();
}else if(currentTab===0){
main.innerHTML=renderDashboard();
}else if(currentTab>=1&&currentTab<=5){
main.innerHTML=renderDomainTab(currentTab-1);
}else if(currentTab===6){
main.innerHTML=renderCSU();
}else if(currentTab===7){
main.innerHTML=renderBadges();
}else if(currentTab===8){
main.innerHTML=renderProfile();
}
lucide.createIcons();
bindEvents();
setTimeout(()=>{
document.querySelectorAll('.progress-fill[data-target]').forEach(el=>{el.style.width=el.dataset.target+'%';});
},50);
}

// ============ EVENT BINDING ============
function bindEvents(){
document.querySelectorAll('#portfolio-btn,#portfolio-btn-mobile').forEach(b=>b.addEventListener('click',()=>{portfolioMode=!portfolioMode;document.getElementById('mobile-menu').classList.add('hidden');render();}));
document.querySelectorAll('#download-app-btn,#download-app-btn-mobile').forEach(b=>b.addEventListener('click',()=>{document.getElementById('mobile-menu').classList.add('hidden');downloadApp();}));
const mmb=document.getElementById('mobile-menu-btn');if(mmb)mmb.addEventListener('click',()=>document.getElementById('mobile-menu').classList.remove('hidden'));
const mmc=document.getElementById('mobile-menu-close');if(mmc)mmc.addEventListener('click',()=>document.getElementById('mobile-menu').classList.add('hidden'));
document.querySelectorAll('.showcase-star').forEach(s=>s.addEventListener('click',function(){
const id=this.dataset.id,domain=this.dataset.domain;
if(domain==='badges'){
const badges=getBadges();const b=badges.find(x=>x.id===id);if(b){b.showcase=!b.showcase;save('badgesCredentials',badges);}
}else{
const entries=getEntries();const list=entries[domain]||[];const e=list.find(x=>x.id===id);if(e){e.showcase=!e.showcase;save('portfolioEntries',entries);}
}
this.classList.toggle('active');
this.style.transform='scale(1.4)';setTimeout(()=>{this.style.transform=this.classList.contains('active')?'scale(1.2)':'scale(1)';},200);
}));
document.querySelectorAll('.add-entry-btn').forEach(b=>b.addEventListener('click',()=>showEntryForm(b.dataset.domain)));
document.querySelectorAll('.edit-entry-btn').forEach(b=>b.addEventListener('click',()=>{
const entries=getEntries();const item=(entries[b.dataset.domain]||[]).find(e=>e.id===b.dataset.id);if(item)showEntryForm(b.dataset.domain,item);
}));
document.querySelectorAll('.del-entry-btn').forEach(b=>b.addEventListener('click',()=>{
if(!confirm('Delete this entry?'))return;
const entries=getEntries();entries[b.dataset.domain]=(entries[b.dataset.domain]||[]).filter(e=>e.id!==b.dataset.id);save('portfolioEntries',entries);render();
}));
if(currentTab===6)bindCSUTab();
if(currentTab===7)bindBadgesTab();
if(currentTab===8)bindProfileTab();
const pb=document.getElementById('print-btn');if(pb)pb.addEventListener('click',()=>window.print());
document.querySelectorAll('.edit-goal-btn').forEach(b=>b.addEventListener('click',function(){
const track=this.dataset.track;
const valEl=this.parentElement.querySelector('.goal-val');
const goals=getGoals();
const current=goals[track]||0;
valEl.innerHTML=`<input type="number" class="text-xs bg-transparent border-b border-azure-400 text-white w-12 outline-none goal-input" value="${current}" min="0" max="200">`;
const inp=valEl.querySelector('.goal-input');
inp.focus();
const saveGoal=()=>{const v=parseInt(inp.value)||0;goals[track]=v;save('degreeGoals',goals);render();};
inp.addEventListener('blur',saveGoal);
inp.addEventListener('keydown',e=>{if(e.key==='Enter')saveGoal();});
}));
}

const addEduBtn=document.querySelector('.add-edu-btn');
if(addEduBtn)addEduBtn.addEventListener('click',()=>{
const area=document.getElementById('edu-form-area');
area.innerHTML=`<div class="p-3 rounded-lg" style="background:rgba(255,255,255,0.05)"><div class="grid grid-cols-1 gap-2 mb-2"><input class="form-input text-sm" id="ne-inst" placeholder="Institution"><input class="form-input text-sm" id="ne-degree" placeholder="Degree"><div class="grid grid-cols-2 gap-2"><input class="form-input text-sm" id="ne-years" placeholder="Years"><select class="form-input text-sm" id="ne-status"><option>Planned</option><option>In Progress</option><option>Complete</option></select></div></div><div class="flex gap-2"><button class="btn-primary text-xs" id="ne-save">Save</button><button class="btn-secondary text-xs" id="ne-cancel">Cancel</button></div></div>`;
document.getElementById('ne-save').addEventListener('click',()=>{
const pr=getProfile();pr.education.push({id:Date.now(),institution:document.getElementById('ne-inst').value,degree:document.getElementById('ne-degree').value,years:document.getElementById('ne-years').value,status:document.getElementById('ne-status').value});save('portfolioProfile',pr);render();
});
document.getElementById('ne-cancel').addEventListener('click',()=>{area.innerHTML='';});
});
}

// ============ INIT ============
initData();
render();
</script>
