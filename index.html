<head>

<style>
:root{--navy:#0f172a;--azure:#0078D4;--azure-hover:#0063b1;--planned:#94a3b8;--progress:#f59e0b;--complete:#22c55e;--violet:#7C3AED}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:radial-gradient(ellipse at center,#0d1b2a 0%,#050a0f 100%);color:#e2e8f0;min-height:100vh}

#global-starfield{position:fixed;inset:0;z-index:0;pointer-events:none}
.star-layer{position:absolute;inset:0}

.card{background:rgba(13,27,42,0.85);backdrop-filter:blur(8px);border:1px solid rgba(0,120,212,0.2);border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.3);transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,120,212,0.15)}

.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:9999px;font-size:12px;font-weight:500}
.badge-planned{background:rgba(148,163,184,0.15);color:#94a3b8}
.badge-progress{background:rgba(245,158,11,0.15);color:#fbbf24}
.badge-complete{background:rgba(34,197,94,0.15);color:#4ade80}
.tag-pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:500;background:rgba(0,120,212,0.2);color:#66b0ff}
.progress-bar{height:8px;border-radius:9999px;background:rgba(255,255,255,0.1);overflow:hidden}
.progress-fill{height:100%;border-radius:9999px;transition:width 1s ease}
.entry-card{border-left:4px solid #94a3b8}
.entry-card[data-status="In Progress"]{border-left-color:#f59e0b}
.entry-card[data-status="Complete"]{border-left-color:#22c55e}
.tab-btn{padding:6px 16px;border-radius:9999px;font-size:13px;font-weight:500;color:#cbd5e1;cursor:pointer;white-space:nowrap;border:none;background:transparent;transition:background .15s,color .15s}
.tab-btn.active{background:#0078D4;color:#fff}
.tab-btn:hover:not(.active){background:rgba(255,255,255,0.1);color:#fff}
.showcase-star{cursor:pointer;transition:transform .2s}
.showcase-star.active{color:#f59e0b;transform:scale(1.2)}
.showcase-star:not(.active){color:#475569}
@keyframes twinkle{0%,100%{opacity:.3}50%{opacity:.9}}
.star-field{position:absolute;inset:0;overflow:hidden}
.constellation-card{background:rgba(13,27,42,0.85);backdrop-filter:blur(8px);border:1px solid rgba(0,120,212,0.2);border-radius:12px;padding:16px}
.credit-ring{filter:drop-shadow(0 0 4px rgba(0,120,212,0.5))}
.nav-header{position:fixed;top:0;left:0;right:0;z-index:100;background:#0f172a;height:56px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid rgba(255,255,255,0.06)}
.main-content{padding-top:64px;position:relative;z-index:1}

.form-input{width:100%;padding:8px 12px;border:1px solid rgba(255,255,255,0.15);border-radius:8px;font-size:14px;font-family:'Inter',sans-serif;background:rgba(255,255,255,0.07);color:#f1f5f9;transition:border-color .15s,box-shadow .15s}
.form-input:focus{outline:none;border-color:#0078D4;box-shadow:0 0 0 3px rgba(0,120,212,0.25)}
.form-input option{background:#1e293b;color:#f1f5f9}
.form-input::placeholder{color:#64748b}

.btn-primary{background:#0078D4;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s}
.btn-primary:hover{background:#0063b1}
.btn-secondary{background:transparent;color:#e2e8f0;border:1px solid rgba(255,255,255,0.3);padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s,border-color .15s}
.btn-secondary:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.5)}
.btn-danger{background:rgba(124,58,237,0.15);color:#c4b5fd;border:1px solid rgba(196,181,253,0.3);padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif}
.btn-danger:hover{background:rgba(124,58,237,0.25)}
.portfolio-view-btn{border:1px solid rgba(255,255,255,0.4);color:#fff;background:transparent;padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s,color .15s}
.portfolio-view-btn:hover{background:rgba(255,255,255,0.1)}
.download-app-btn{border:1px solid rgba(255,255,255,0.4);color:#fff;background:transparent;padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s,color .15s}
.download-app-btn:hover{background:rgba(255,255,255,1);color:#0f172a}
.mobile-tabs-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.mobile-tabs-scroll::-webkit-scrollbar{display:none}
.date-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.1);border:none;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:#94a3b8;line-height:1}
.degree-pill{display:inline-flex;padding:2px 8px;border-radius:9999px;font-size:10px;font-weight:500;background:rgba(0,120,212,0.15);color:#66b0ff}
.filter-pill{padding:4px 12px;border-radius:9999px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,0.15);background:transparent;color:#94a3b8;transition:all .15s}
.filter-pill.active{background:#0078D4;color:#fff;border-color:#0078D4}
.avatar-circle{width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;cursor:pointer}
.avatar-circle .overlay{position:absolute;inset:0;background:rgba(0,0,0,0.5);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;border-radius:50%;color:#fff;font-size:11px;gap:2px}
.avatar-circle:hover .overlay{opacity:1}
.check-pill{display:inline-flex;align-items:center;padding:4px 12px;border-radius:9999px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,0.15);background:transparent;color:#94a3b8;transition:all .15s}
.check-pill.checked{background:rgba(0,120,212,0.2);color:#66b0ff;border-color:rgba(0,120,212,0.4)}

.dash-space-bg{position:relative;min-height:calc(100vh - 64px)}
.dash-glass-card{background:rgba(13,27,42,0.85)!important;backdrop-filter:blur(8px);border:1px solid rgba(0,120,212,0.25)!important;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.3);transition:transform .2s,box-shadow .2s}
.dash-glass-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,120,212,0.15)}
.dash-progress-bar{height:8px;border-radius:9999px;background:rgba(255,255,255,0.1);overflow:hidden}
.dash-tag-pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:500;background:rgba(0,120,212,0.2);color:#66b0ff}

.dash-domain-card{background:rgba(13,27,42,0.85)!important;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08)!important;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.3);transition:transform .25s,box-shadow .25s,border-color .25s}
.dash-domain-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.35)}
.dash-domain-card.clickable-card{cursor:pointer}
.dash-domain-card .view-all-link{opacity:0;transform:translateX(-4px);transition:opacity .25s,transform .25s}
.dash-domain-card:hover .view-all-link{opacity:1;transform:translateX(0)}

.text-violet{color:#c4b5fd}
.text-violet-light{color:#a78bfa}
.hover-text-violet:hover{color:#ddd6fe}

.bg-surface-100-dark{background:rgba(255,255,255,0.05)!important}

footer{position:relative;z-index:1}

@keyframes violetPulse{
  0%,100%{border-left-color:rgba(124,58,237,0.5);box-shadow:-4px 0 12px rgba(124,58,237,0.1)}
  50%{border-left-color:rgba(139,92,246,1);box-shadow:-4px 0 18px rgba(139,92,246,0.35)}
}
.next-chapter-card{
  background:rgba(13,27,42,0.85);
  backdrop-filter:blur(8px);
  border:1px solid rgba(0,120,212,0.2);
  border-radius:12px;
  border-left:4px solid #7C3AED;
  animation:violetPulse 3s ease-in-out infinite;
  position:relative;
  z-index:9999;
  isolation:isolate;
  overflow:visible;
  transition:box-shadow .3s;
}
.next-chapter-card:hover{
  box-shadow:0 6px 24px rgba(124,58,237,0.2),-4px 0 20px rgba(139,92,246,0.25);
}
.next-chapter-tooltip{
  visibility:hidden;opacity:0;
  position:absolute;
  z-index:9999;
  isolation:isolate;
  bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);
  background:#1e293b;color:#cbd5e1;
  font-size:12px;line-height:1.5;
  padding:10px 14px;border-radius:8px;
  width:320px;max-width:90vw;
  box-shadow:0 4px 16px rgba(0,0,0,0.4);
  border:1px solid rgba(124,58,237,0.3);
  pointer-events:none;
  transition:opacity .2s,visibility .2s;
}
.next-chapter-tooltip::after{
  content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);
  border:6px solid transparent;border-top-color:#1e293b;
}
.next-chapter-card:hover .next-chapter-tooltip{
  visibility:visible;opacity:1;
}

.group-header{display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:10px;margin-bottom:12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06)}
.group-header .group-icon{font-size:1.1rem}
.group-header .group-title{font-weight:600;color:#e2e8f0;font-size:14px}
.group-header .group-count{font-size:11px;color:#64748b;font-weight:500}

.credit-summary-card{background:linear-gradient(135deg,rgba(0,120,212,0.12),rgba(124,58,237,0.08));border:1px solid rgba(0,120,212,0.3);border-radius:14px;padding:20px 24px}
.credit-bar-segment{height:100%;display:inline-block;transition:width 1s ease}

.color-key-legend{
  background:rgba(13,27,42,0.85);
  backdrop-filter:blur(8px);
  border:1px solid rgba(124,58,237,0.25);
  border-radius:12px;
  padding:14px 20px;
  margin-bottom:20px;
}
.color-key-legend .legend-title{
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.08em;
  color:#c4b5fd;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:6px;
}
.color-key-legend .legend-items{
  display:flex;
  flex-wrap:wrap;
  gap:8px 16px;
  align-items:center;
}
.color-key-swatch{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:3px 10px;
  border-radius:9999px;
  font-size:11px;
  font-weight:500;
  white-space:nowrap;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.04);
}
.color-key-swatch .swatch-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  flex-shrink:0;
}

.edu-card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(124,58,237,0.2);
  border-left:3px solid #7C3AED;
  border-radius:10px;
  padding:14px 16px;
  transition:border-color .2s,background .2s;
}
.edu-card:hover{
  border-color:rgba(124,58,237,0.4);
  background:rgba(255,255,255,0.06);
}
.edu-form-inline{
  background:rgba(13,27,42,0.9);
  border:1px solid rgba(0,120,212,0.3);
  border-left:4px solid #0078D4;
  border-radius:12px;
  padding:16px 20px;
  margin-top:8px;
  animation:eduFormSlideIn .25s ease-out;
}
@keyframes eduFormSlideIn{
  from{opacity:0;transform:translateY(-8px);max-height:0}
  to{opacity:1;transform:translateY(0);max-height:600px}
}

.back-to-dash-btn{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:5px 14px;
  border-radius:9999px;
  font-size:12px;
  font-weight:500;
  color:#cbd5e1;
  background:rgba(124,58,237,0.08);
  border:1px solid rgba(124,58,237,0.25);
  cursor:pointer;
  font-family:'Inter',sans-serif;
  transition:all .2s;
  margin-bottom:16px;
}
.back-to-dash-btn:hover{
  background:rgba(124,58,237,0.2);
  border-color:rgba(124,58,237,0.5);
  color:#fff;
}

#dash-sparkles-container{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}

/* ============ NG FANGIRL STYLES ============ */
.ng-tab-bg{
  background:linear-gradient(135deg,rgba(168,85,247,0.08),rgba(236,72,153,0.06),rgba(99,102,241,0.08));
  min-height:calc(100vh - 64px);
  position:relative;
}
.ng-banner{
  text-align:center;
  padding:32px 16px 24px;
  position:relative;
}
.ng-banner-title{
  font-size:2rem;
  font-weight:800;
  background:linear-gradient(135deg,#a855f7,#ec4899);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:ngShimmer 3s ease-in-out infinite;
}
@keyframes ngShimmer{
  0%,100%{filter:brightness(1);opacity:1}
  50%{filter:brightness(1.3);opacity:0.92}
}
.ng-course-card{
  background:rgba(168,85,247,0.08);
  backdrop-filter:blur(8px);
  border:1px solid rgba(168,85,247,0.4);
  border-radius:14px;
  box-shadow:0 0 12px rgba(168,85,247,0.15);
  padding:20px;
  transition:transform .2s,box-shadow .2s;
}
.ng-course-card:hover{
  transform:translateY(-3px);
  box-shadow:0 0 24px rgba(168,85,247,0.25),0 8px 24px rgba(0,0,0,0.3);
}
.ng-complete-btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 14px;
  border-radius:9999px;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  border:1px solid rgba(168,85,247,0.4);
  background:rgba(168,85,247,0.15);
  color:#c4b5fd;
  font-family:'Inter',sans-serif;
  transition:all .2s;
}
.ng-complete-btn.completed{
  background:rgba(34,197,94,0.2);
  border-color:rgba(34,197,94,0.5);
  color:#4ade80;
}
.ng-complete-btn:hover{
  transform:scale(1.05);
}
.ng-progress-bar{
  height:12px;
  border-radius:9999px;
  background:rgba(255,255,255,0.1);
  overflow:hidden;
}
.ng-progress-fill{
  height:100%;
  border-radius:9999px;
  background:linear-gradient(90deg,#a855f7,#ec4899);
  transition:width 1s ease;
}
.ng-quote-card{
  background:rgba(236,72,153,0.08);
  border:1px solid rgba(236,72,153,0.3);
  border-left:4px solid #ec4899;
  border-radius:12px;
  padding:16px 20px;
  font-style:italic;
  color:#f9a8d4;
  font-size:14px;
  line-height:1.6;
}
.ng-footer-card{
  background:linear-gradient(135deg,rgba(236,72,153,0.12),rgba(168,85,247,0.1));
  border:1px solid rgba(236,72,153,0.3);
  border-radius:14px;
  padding:24px;
  text-align:center;
}
.ng-toast{
  position:fixed;
  top:24px;
  left:50%;
  transform:translateX(-50%) translateY(-20px);
  background:linear-gradient(135deg,#7c3aed,#ec4899);
  color:#fff;
  padding:14px 24px;
  border-radius:12px;
  font-size:14px;
  font-weight:600;
  z-index:10001;
  box-shadow:0 8px 32px rgba(124,58,237,0.4);
  max-width:400px;
  text-align:center;
  opacity:0;
  transition:opacity .4s,transform .4s;
  pointer-events:none;
}
.ng-toast.visible{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

@media print{.no-print{display:none!important}}
</style>
</head>

<script>
// ============ GLOBAL STARFIELD ============
function initGlobalStarfield(){
  const container=document.getElementById('global-starfield');
  let stars='';for(let i=0;i<150;i++){const x=Math.random()*100,y=Math.random()*100,s=Math.random()>0.93?3:Math.random()>0.8?2:1,o=(Math.random()*0.6+0.3).toFixed(2);stars+=`${x}vw ${y}vh 0 ${s-1}px rgba(255,255,255,${o}),`;}
  stars=stars.slice(0,-1);
  let bigStars='';for(let i=0;i<8;i++){const x=Math.random()*90+5,y=Math.random()*80+10;bigStars+=`${x}vw ${y}vh 0 2px rgba(255,255,255,0.8),`;}bigStars=bigStars.slice(0,-1);
  container.innerHTML=`<div class="star-layer" style="box-shadow:${stars}"></div><div class="star-layer" style="box-shadow:${bigStars};animation:twinkle 4s ease-in-out infinite"></div>`;
}
initGlobalStarfield();

// ============ DASHBOARD SPARKLES (DOM-based) ============
function clearDashSparkles(){
  var el=document.getElementById('dash-sparkles-container');
  if(el&&el.parentNode)el.remove();
}

function initDashSparkles(){
  clearDashSparkles();
  var container=document.createElement('div');
  container.id='dash-sparkles-container';
  document.body.appendChild(container);

  var colors=['#ffffff','#e2e8f0','#c8d6e8','#a8b8d0','#f0f4ff'];
  var TOTAL=200;
  var GLOW_COUNT=30;
  var CROSS_COUNT=20;

  var styleEl=document.createElement('style');
  var keyframes='';
  for(var i=0;i<TOTAL;i++){
    var peakOpacity=(0.7+Math.random()*0.3).toFixed(2);
    var minOpacity=(Math.random()*0.08).toFixed(2);
    var peakScale=(1.3+Math.random()*0.5).toFixed(2);
    keyframes+=`@keyframes sparkle-${i}{0%,100%{opacity:${minOpacity};transform:scale(1);}50%{opacity:${peakOpacity};transform:scale(${peakScale});}}`;
  }
  styleEl.textContent=keyframes;
  container.appendChild(styleEl);

  for(var i=0;i<TOTAL;i++){
    var isCross=i<CROSS_COUNT;
    var isGlow=i>=CROSS_COUNT&&i<CROSS_COUNT+GLOW_COUNT;

    if(isCross){
      var star=document.createElement('div');
      star.textContent='\u2726';
      var sz=3+Math.random()*2;
      var left=Math.random()*100;
      var top=Math.random()*100;
      var color=colors[Math.floor(Math.random()*colors.length)];
      var dur=(1.5+Math.random()*2.5).toFixed(2);
      var delay=(Math.random()*4).toFixed(2);
      var startOpacity=(0.2+Math.random()*0.5).toFixed(2);
      star.style.cssText='position:absolute;left:'+left+'%;top:'+top+'%;font-size:'+sz+'px;color:'+color+';opacity:'+startOpacity+';animation:sparkle-'+i+' '+dur+'s '+delay+'s infinite ease-in-out;line-height:1;pointer-events:none;';
      container.appendChild(star);
    }else{
      var dot=document.createElement('div');
      var sz=1+Math.random()*2;
      var left=Math.random()*100;
      var top=Math.random()*100;
      var color=colors[Math.floor(Math.random()*colors.length)];
      var dur=(0.8+Math.random()*3.2).toFixed(2);
      var delay=(Math.random()*4).toFixed(2);
      var startOpacity=(0.2+Math.random()*0.7).toFixed(2);
      var extraStyle='';
      if(isGlow){
        extraStyle='box-shadow:0 0 3px 1px rgba(255,255,255,0.8);';
      }
      dot.style.cssText='position:absolute;left:'+left+'%;top:'+top+'%;width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+color+';opacity:'+startOpacity+';animation:sparkle-'+i+' '+dur+'s '+delay+'s infinite ease-in-out;pointer-events:none;'+extraStyle;
      container.appendChild(dot);
    }
  }
}

// ============ DOWNLOAD APP FUNCTION ============
function downloadApp(){
  var html='<!DOCTYPE html>\n'+document.documentElement.outerHTML;
  var blob=new Blob([html],{type:'text/html'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='cloud-portfolio.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ============ NG TOAST HELPER ============
function showNgToast(msg){
  var existing=document.getElementById('ng-popup-toast');
  if(existing)existing.remove();
  var toast=document.createElement('div');
  toast.id='ng-popup-toast';
  toast.className='ng-toast';
  toast.textContent=msg;
  document.body.appendChild(toast);
  requestAnimationFrame(function(){requestAnimationFrame(function(){toast.classList.add('visible');});});
  setTimeout(function(){toast.classList.remove('visible');setTimeout(function(){if(toast.parentNode)toast.remove();},400);},3000);
}

// ============ HELPERS ============
function genId(){return Math.random().toString(36).substr(2,9)}
function save(k,v){localStorage.setItem(k,JSON.stringify(v))}
function load(k){try{return JSON.parse(localStorage.getItem(k))}catch(e){return null}}
function fmtDate(d){if(!d)return '';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-US',{month:'short',year:'numeric'})}
function fmtDateFull(d){if(!d)return '';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}
function monthDiff(a,b){if(!a||!b)return 0;const da=new Date(a+'T00:00:00'),db=new Date(b+'T00:00:00');return Math.max(1,Math.round((db-da)/(1000*60*60*24*30)))}
function statusBadge(s){const c=s==='Complete'?'badge-complete':s==='In Progress'?'badge-progress':'badge-planned';return `<span class="${c} badge">${s}</span>`}
function tagPills(tags){return (tags||[]).map(t=>`<span class="tag-pill">${esc(t)}</span>`).join('')}
function dashTagPills(tags){return (tags||[]).map(t=>`<span class="dash-tag-pill">${esc(t)}</span>`).join('')}
function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function today(){return '2026-05-12'}

// ============ NG COURSES DATA ============
function getNgCourses(){
  var saved=load('ngCourses');
  var courses=JSON.parse(JSON.stringify(NG_COURSES_DEFAULT));
  if(saved&&typeof saved==='object'){
    courses.forEach(function(c){
      if(saved[c.id]){
        if(typeof saved[c.id].completed==='boolean')c.completed=saved[c.id].completed;
        if(saved[c.id].startDate)c.startDate=saved[c.id].startDate;
      }
    });
  }
  return courses;
}
function saveNgCourses(courses){
  var obj={};
  courses.forEach(function(c){obj[c.id]={completed:c.completed,startDate:c.startDate};});
  localStorage.setItem('ngCourses',JSON.stringify(obj));
}

// ============ CREDIT CALCULATOR ============
function calcCredits(){
const entries=getEntries();
const csu=entries.csu||[];
let transferComplete=0,geComplete=0,gePlanned=0,majorComplete=0,majorPlanned=0,specComplete=0,specPlanned=0,electComplete=0,electPlanned=0,msComplete=0,msPlanned=0,cyberComplete=0,cyberPlanned=0;
let totalEarned=0,totalInProg=0,totalPlanned=0;
csu.forEach(c=>{
  const cr=c.credits||0;
  if(c.status==='Complete'){
    totalEarned+=cr;
    if(c.group==='Transfer Credits'){
      transferComplete+=cr;
    }
  }else if(c.status==='In Progress'){
    totalInProg+=cr;
  }else{
    totalPlanned+=cr;
  }
});
return {transferComplete,totalEarned,totalInProg,totalPlanned,total:totalEarned+totalInProg+totalPlanned};
}

function renderConstellation(){
const entries=getEntries();
const csu=entries.csu||[];
const goals=getGoals();

let html=`<div class="relative">`;
html+=`<div class="relative z-10"><div class="mb-6"><h3 class="text-white font-bold text-lg"><i data-lucide="orbit" class="w-5 h-5 inline text-violet-400"></i> Degree Constellation</h3><p class="text-slate-400 text-sm">Track your credits across each program</p></div>`;
html+=`<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">`;
let totalLogged=0;
DEGREE_TRACKS.forEach((track,i)=>{
const goal=goals[track]||0;
let earned=0,inProg=0,planned=0;
csu.forEach(c=>{if((c.degreeTrack||[]).includes(track)){if(c.status==='Complete')earned+=c.credits||0;else if(c.status==='In Progress')inProg+=c.credits||0;else planned+=c.credits||0;}});
totalLogged+=earned+inProg+planned;
const pct=goal?Math.min(100,Math.round(earned/goal*100)):0;
const r=28,circ=2*Math.PI*r,offset=circ-(pct/100)*circ;
html+=`<div class="constellation-card"><div class="flex items-center gap-2 mb-3"><span class="text-xl">${DEGREE_TRACK_ICONS[i]}</span><div class="flex-1 min-w-0"><div class="text-white font-semibold text-sm truncate">${track}</div><div class="text-azure-300 text-xs font-medium">${earned.toFixed(1)} / ${goal} cr</div></div></div>`;
html+=`<div class="flex justify-center mb-3"><svg width="70" height="70" class="credit-ring"><circle cx="35" cy="35" r="${r}" stroke="#1e293b" stroke-width="5" fill="none"/><circle cx="35" cy="35" r="${r}" stroke="#0078D4" stroke-width="5" fill="none" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" transform="rotate(-90 35 35)"/><text x="35" y="38" text-anchor="middle" fill="white" font-size="13" font-weight="bold">${pct}%</text></svg></div>`;
const eW=goal?(earned/goal*100):0,iW=goal?(inProg/goal*100):0,pW=goal?(planned/goal*100):0;
html+=`<div class="h-2 rounded-full overflow-hidden flex mb-2" style="background:#1e293b"><div style="width:${Math.min(eW,100)}%;background:#22c55e" class="h-full"></div><div style="width:${Math.min(iW,100-eW)}%;background:#f59e0b" class="h-full"></div><div style="width:${Math.min(pW,100-eW-iW)}%;background:#475569" class="h-full"></div></div>`;
html+=`<div class="text-xs text-slate-400">${earned.toFixed(1)} earned \u00B7 ${inProg.toFixed(1)} in progress \u00B7 ${planned.toFixed(1)} planned</div>`;
html+=`<div class="mt-2 flex items-center gap-1 text-xs"><span class="text-slate-400"><i data-lucide="target" class="w-3 h-3 inline"></i> Goal:</span><span class="text-white font-medium goal-val" data-track="${track}">${goal} cr</span><button class="text-azure-400 hover:text-azure-300 ml-1 edit-goal-btn" data-track="${track}" title="Edit goal"><i data-lucide="pencil" class="w-3 h-3"></i></button></div>`;
html+=`</div>`;
});
html+=`</div>`;
html+=`<p class="text-center text-slate-500 text-sm mt-6">Total Credits Logged: ${totalLogged.toFixed(1)} cr across all programs</p>`;
html+=`</div></div>`;
return html;
}

<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4"><div><label class="text-xs font-medium text-slate-400 mb-1 block">Start Date</label><div class="relative"><input type="date" class="form-input pr-8" id="cf-start" value="${e.startDate||''}"><button class="date-clear" id="cf-start-clear" style="${e.startDate?'':'display:none'}">&times;</button></div></div><div><label class="text-xs font-medium text-slate-400 mb-1 block">End Date</label><div class="relative"><input type="date" class="form-input pr-8" id="cf-end" value="${e.endDate||''}"><button class="date-clear" id="cf-end-clear" style="${e.endDate?'':'display:none'}">&times;</button></div></div></div>

document.getElementById('cf-start').addEventListener('input',function(){document.getElementById('cf-start-clear').style.display=this.value?'':'none';});
document.getElementById('cf-end').addEventListener('input',function(){document.getElementById('cf-end-clear').style.display=this.value?'':'none';});
document.getElementById('cf-start-clear').addEventListener('click',function(){document.getElementById('cf-start').value='';this.style.display='none';});
document.getElementById('cf-end-clear').addEventListener('click',function(){document.getElementById('cf-end').value='';this.style.display='none';});
document.querySelectorAll('#cf-tracks .check-pill').forEach(pill=>{
pill.addEventListener('click',function(ev){
if(ev.target.tagName==='INPUT')return;
const cb=this.querySelector('input');cb.checked=!cb.checked;this.classList.toggle('checked',cb.checked);
});
});
document.getElementById('cf-save').addEventListener('click',()=>{
const entries=getEntries();
const csu=entries.csu||[];
const tracks=[];document.querySelectorAll('#cf-tracks .dt-check:checked').forEach(cb=>tracks.push(cb.value));
const grp=document.getElementById('cf-group').value;
const newC={id:entry?entry.id:genId(),code:document.getElementById('cf-code').value,title:document.getElementById('cf-title').value,description:document.getElementById('cf-desc').value,status:document.getElementById('cf-status').value,group:grp,category:grp,platform:document.getElementById('cf-platform').value,credits:parseFloat(document.getElementById('cf-credits').value)||0,degreeTrack:tracks,tags:document.getElementById('cf-tags').value.split(',').map(t=>t.trim()).filter(Boolean),link:document.getElementById('cf-link').value,notes:document.getElementById('cf-notes').value,showcase:document.getElementById('cf-showcase').checked,startDate:document.getElementById('cf-start').value,endDate:document.getElementById('cf-end').value,createdAt:entry?entry.createdAt:new Date().toISOString()};
if(entry){const idx=csu.findIndex(x=>x.id===entry.id);if(idx>=0)csu[idx]=newC;}else csu.push(newC);
entries.csu=csu;save('portfolioEntries',entries);render();
});
document.getElementById('cf-cancel').addEventListener('click',()=>{area.innerHTML='';});
}

const slotId=entry?'edu-form-slot-'+entry.id:'edu-add-form-area';

if(!slot)return;
const formId='eduform-'+(entry?entry.id:'new');

<div><label class="text-xs font-medium text-slate-400 mb-1 block">Degree / Program</label><input class="form-input" id="${formId}-degree" value="${esc(e.degree)}" placeholder="e.g. B.S. Computer Information Systems"></div>
</div>

<div><label class="text-xs font-medium text-slate-400 mb-1 block">Status</label><select class="form-input" id="${formId}-status"><option ${e.status==='Planned'?'selected':''}>Planned</option><option ${e.status==='In Progress'?'selected':''}>In Progress</option><option ${e.status==='Complete'?'selected':''}>Complete</option></select></div>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
<div><label class="text-xs font-medium text-slate-400 mb-1 block">Start Year</label><input type="number" class="form-input" id="${formId}-start" value="${e.startYear||''}" placeholder="2025" min="1990" max="2040"></div>
<div><label class="text-xs font-medium text-slate-400 mb-1 block">End Year</label><input type="number" class="form-input" id="${formId}-end" value="${e.endYear||''}" placeholder="2027" min="1990" max="2040" ${e.isPresent?'disabled':''}></div>
<div class="flex items-end pb-2"><label class="check-pill ${e.isPresent?'checked':''} cursor-pointer" id="${formId}-present-pill"><input type="checkbox" class="hidden" id="${formId}-present" ${e.isPresent?'checked':''}> Present</label></div>
</div>
<div class="mb-3"><label class="text-xs font-medium text-slate-400 mb-1 block">Notes</label><textarea class="form-input" id="${formId}-notes" rows="2" placeholder="Additional details...">${esc(e.notes)}</textarea></div>
<div class="flex gap-2">
<button class="btn-primary text-xs" id="${formId}-save"><i data-lucide="check" class="w-3 h-3 inline"></i> Save</button>
<button class="btn-secondary text-xs" id="${formId}-cancel"><i data-lucide="x" class="w-3 h-3 inline"></i> Cancel</button>
</div>
</div>`;
lucide.createIcons();

const presentPill=document.getElementById(formId+'-present-pill');
const presentCb=document.getElementById(formId+'-present');
const endInput=document.getElementById(formId+'-end');
presentPill.addEventListener('click',function(ev){
  if(ev.target.tagName==='INPUT')return;
  presentCb.checked=!presentCb.checked;
  presentPill.classList.toggle('checked',presentCb.checked);
  endInput.disabled=presentCb.checked;
  if(presentCb.checked)endInput.value='';
});
presentCb.addEventListener('change',function(){
  presentPill.classList.toggle('checked',this.checked);
  endInput.disabled=this.checked;
  if(this.checked)endInput.value='';
});

document.getElementById(formId+'-save').addEventListener('click',function(){
  var eduList=getEducation()||[];
  var newE={
    id:entry?entry.id:genId(),
    institution:document.getElementById(formId+'-inst').value.trim(),
    degree:document.getElementById(formId+'-degree').value.trim(),
    fieldOfStudy:document.getElementById(formId+'-field').value.trim(),
    startYear:parseInt(document.getElementById(formId+'-start').value)||null,
    endYear:presentCb.checked?null:(parseInt(document.getElementById(formId+'-end').value)||null),
    isPresent:presentCb.checked,
    status:document.getElementById(formId+'-status').value,
    notes:document.getElementById(formId+'-notes').value.trim()
  };
  if(!newE.institution&&!newE.degree){slot.innerHTML='';return;}
  if(entry){
    var idx=eduList.findIndex(x=>x.id===entry.id);
    if(idx>=0)eduList[idx]=newE;
  }else{
    eduList.push(newE);
  }
  saveEducation(eduList);
  render();
});

document.getElementById(formId+'-cancel').addEventListener('click',function(){
  slot.innerHTML='';
});
}

function render(){

const main=document.getElementById('app-main');
main.style.background='transparent';

// ============ NG TAB BINDING ============
function bindNgTab(){
  document.querySelectorAll('.ng-complete-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      var id=this.dataset.ngId;
      var courses=getNgCourses();
      var c=courses.find(function(x){return x.id===id;});
      if(!c)return;
      c.completed=!c.completed;
      saveNgCourses(courses);

      // Update button in-place
      if(c.completed){
        this.classList.add('completed');
        this.textContent='\u2705 Complete';
      }else{
        this.classList.remove('completed');
        this.textContent='\u2B1C Not Yet';
      }

      // Update progress bar in-place
      var completedCount=courses.filter(function(x){return x.completed;}).length;
      var totalCount=courses.length;
      var pct=totalCount?Math.round(completedCount/totalCount*100):0;
      var fill=document.getElementById('ng-progress-fill');
      if(fill){fill.style.width=pct+'%';fill.dataset.target=pct;}
      var txt=document.getElementById('ng-progress-text');
      if(txt)txt.textContent=completedCount+' / '+totalCount+' complete \u2014 '+pct+'%';
    });
  });
}

// ============ DASHBOARD CARD NAVIGATION ============
function bindDashboardCardNavigation(){
document.querySelectorAll('.dash-domain-card[data-tab-target]').forEach(card=>{
  card.addEventListener('click',function(e){
    if(e.target.closest('button')||e.target.closest('a')||e.target.closest('input')){return;}
    const target=parseInt(this.dataset.tabTarget);
    if(!isNaN(target)){
      currentTab=target;
      portfolioMode=false;
      render();
      window.scrollTo({top:0,behavior:'smooth'});
    }
  });

  const accent=card.dataset.accent;
  card.addEventListener('mouseenter',function(){
    this.style.borderColor=accent+'80';
    this.style.boxShadow=`0 8px 28px ${accent}25, 0 0 0 1px ${accent}30`;
  });
  card.addEventListener('mouseleave',function(){
    this.style.borderColor='';
    this.style.boxShadow='';
  });
});
}
